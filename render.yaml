services:
  - type: web
    name: f14-attendance
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: f14-attendance-db
          property: connectionString

databases:
  - name: f14-attendance-db
    plan: free
    databaseName: f14_attendance
    user: f14_user
